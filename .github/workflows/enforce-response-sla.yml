name: Enforce 24h Response SLA

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: enforce-response-sla
  cancel-in-progress: true

jobs:
  enforce-sla:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Enforce 24h response SLA
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: npx tsx scripts/enforce-response-sla.ts
