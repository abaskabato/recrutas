name: Push Schema to Dev DB

on:
  workflow_dispatch:  # Manual trigger only

concurrency:
  group: push-schema-dev
  cancel-in-progress: true

jobs:
  push-schema:
    name: Drizzle Push → recrutas-dev
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: development

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Push schema to dev database
        run: npx drizzle-kit push --force
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL_DEV }}
