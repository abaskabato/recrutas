name: Discover and Probe Companies

on:
  schedule:
    # Run daily at 2 AM UTC — before scrape-tech-companies (if it exists)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max companies to probe per run (default: 300, max: 300)'
        required: false
        default: '300'
        type: string

concurrency:
  group: discover-companies
  cancel-in-progress: true

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Phase 1 — Mine job postings for new companies
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: npx tsx scripts/discover-companies.ts --phase=discover

      - name: Phase 2 — Apollo.io company seeding
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
        run: npx tsx scripts/discover-companies.ts --phase=apollo

      - name: Phase 3 — ATS probe pending companies
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: |
          LIMIT="${{ github.event.inputs.limit || '300' }}"
          npx tsx scripts/discover-companies.ts --phase=probe --limit=${LIMIT}
