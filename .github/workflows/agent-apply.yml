name: Agent Apply Worker

on:
  workflow_dispatch:  # Manual trigger from admin
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes — Browser Use takes 5-10 min per task

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'python/requirements.txt'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: pip install -r python/requirements.txt

      - name: Install Chromium for Playwright
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Set Chromium path for Browser Use
        run: |
          CHROME_PATH=$(which chrome || which google-chrome || which google-chrome-stable || which chromium-browser || which chromium || echo "")
          if [ -z "$CHROME_PATH" ]; then
            echo "Chrome not found, trying default location..."
            CHROME_PATH="/usr/bin/google-chrome-stable"
          fi
          echo "CHROMIUM_PATH=$CHROME_PATH" >> $GITHUB_ENV
          echo "Using Chrome at: $CHROME_PATH"
          $CHROME_PATH --version || true

      - name: Process agent tasks
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FRONTEND_URL: https://www.recrutas.ai
          CHROMIUM_PATH: ${{ env.CHROMIUM_PATH }}
        run: npx tsx scripts/process-agent-tasks.ts
