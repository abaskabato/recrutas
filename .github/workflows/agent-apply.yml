name: Agent Apply Worker

on:
  workflow_dispatch:  # Manual trigger from admin
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes — batches all queued tasks

# Only one run at a time — prevents race conditions when multiple users queue tasks
concurrency:
  group: agent-apply
  cancel-in-progress: false  # Don't cancel running jobs, queue them instead

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx rebrowser-playwright install chromium --with-deps

      - name: Process agent tasks
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npx tsx scripts/process-agent-tasks.ts
