name: Agent Apply Worker

on:
  workflow_dispatch:  # Manual trigger from admin
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes — Browser Use takes 5-10 min per task

# Only one run at a time — prevents race conditions when multiple users queue tasks
concurrency:
  group: agent-apply
  cancel-in-progress: false  # Don't cancel running jobs, queue them instead

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 20  # Increased — Browser Use takes longer per task

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'python/requirements.txt'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: pip install -r python/requirements.txt

      - name: Install Playwright system deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libnss3 libnspr4 libatk1.0-0t64 libatk-bridge2.0-0t64 libcups2t64 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2t64 libatspi2.0-0t64

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Process agent tasks
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FRONTEND_URL: https://www.recrutas.ai
        run: npx tsx scripts/process-agent-tasks.ts
