name: Purge Old External Jobs

on:
  schedule:
    # Run daily at 5 AM UTC (after auto-hide-ghost-jobs at 4 AM)
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      retain_days:
        description: 'Keep jobs newer than this many days (default: 90)'
        required: false
        default: '90'
        type: string

concurrency:
  group: purge-old-jobs
  cancel-in-progress: true

jobs:
  purge:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Delete stale external jobs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: |
          RETAIN_DAYS="${{ github.event.inputs.retain_days || '90' }}"
          npx tsx scripts/purge-old-jobs.ts --retainDays=${RETAIN_DAYS}
