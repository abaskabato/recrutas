name: Auto-Hide Ghost Jobs

on:
  schedule:
    # Run daily at 4 AM UTC (after scrape-tech-companies at 2 AM)
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      stale_days:
        description: 'Days of inactivity before closing a job (default: 30)'
        required: false
        default: '30'
        type: string

jobs:
  auto-hide:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Close stale internal jobs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: |
          STALE_DAYS="${{ github.event.inputs.stale_days || '30' }}"
          npx tsx scripts/auto-hide-ghost-jobs.ts --staleDays=${STALE_DAYS}
