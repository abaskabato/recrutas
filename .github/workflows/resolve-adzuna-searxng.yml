name: Resolve Adzuna URLs (SearXNG)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no DB writes)'
        type: boolean
        default: false
      concurrency:
        description: 'Parallel searches'
        type: number
        default: 10

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Create SearXNG settings
        run: |
          mkdir -p /tmp/searxng
          cat > /tmp/searxng/settings.yml << 'EOF'
          use_default_settings: true
          server:
            secret_key: "recrutas-searxng-secret"
            limiter: false
          search:
            safe_search: 0
            formats:
              - html
              - json
          engines:
            - name: google
              engine: google
              shortcut: g
            - name: bing
              engine: bing
              shortcut: b
            - name: duckduckgo
              engine: duckduckgo
              shortcut: d
          EOF

      - name: Start SearXNG
        run: |
          docker run -d \
            --name searxng \
            -p 8080:8080 \
            -v /tmp/searxng:/etc/searxng:rw \
            -e SEARXNG_SECRET_KEY=recrutas-searxng-secret \
            searxng/searxng:latest

      - name: Wait for SearXNG
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080 > /dev/null; then echo "SearXNG ready"; break; fi
            sleep 3
          done

      - name: Run migration slice
        env:
          POSTGRES_URL: ${{ secrets.DIRECT_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.DIRECT_URL }}
          SEARXNG_URL: http://localhost:8080
        run: |
          ARGS="--slice 0 --total-slices 1 --concurrency ${{ inputs.concurrency }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          npx tsx scripts/migrate-adzuna-searxng.ts $ARGS
