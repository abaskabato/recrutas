<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary meta -->
    <title>Recrutas — AI-Driven Hiring Platform</title>
    <meta name="description" content="AI-powered instant job matching that connects qualified candidates with full-time roles in real-time. Get matched, chat, and get hired — in minutes, not weeks." />
    <meta name="keywords" content="AI hiring, job matching, recruiter platform, candidate matching, instant hiring, AI recruitment, job search" />
    <meta name="author" content="Recrutas" />
    <link rel="canonical" href="https://recrutas.ai/" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Recrutas" />
    <meta property="og:url" content="https://recrutas.ai/" />
    <meta property="og:title" content="Recrutas — AI-Driven Hiring Platform" />
    <meta property="og:description" content="Skip the endless applications. Get AI-matched to full-time roles, chat with hiring managers, and get hired in minutes." />
    <meta property="og:image" content="https://recrutas.ai/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Recrutas — AI-Driven Hiring Platform" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@recrutas_ai" />
    <meta name="twitter:title" content="Recrutas — AI-Driven Hiring Platform" />
    <meta name="twitter:description" content="Skip the endless applications. Get AI-matched to full-time roles, chat with hiring managers, and get hired in minutes." />
    <meta name="twitter:image" content="https://recrutas.ai/og-image.png" />
    <meta name="twitter:image:alt" content="Recrutas — AI-Driven Hiring Platform" />

    <!-- Favicons & PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#10B981" />

    <!-- Performance: preconnect to external origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://api.groq.com" />

    <!-- Structured data: Organization + WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://recrutas.ai/#organization",
          "name": "Recrutas",
          "url": "https://recrutas.ai",
          "logo": {
            "@type": "ImageObject",
            "url": "https://recrutas.ai/icon-512.png",
            "width": 512,
            "height": 512
          },
          "description": "AI-powered hiring platform that connects qualified candidates with full-time roles through intelligent matching and real-time communication.",
          "sameAs": []
        },
        {
          "@type": "WebSite",
          "@id": "https://recrutas.ai/#website",
          "url": "https://recrutas.ai",
          "name": "Recrutas",
          "description": "AI-Driven Hiring Platform",
          "publisher": { "@id": "https://recrutas.ai/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://recrutas.ai/?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "WebPage",
          "@id": "https://recrutas.ai/#webpage",
          "url": "https://recrutas.ai",
          "name": "Recrutas — AI-Driven Hiring Platform",
          "isPartOf": { "@id": "https://recrutas.ai/#website" },
          "about": { "@id": "https://recrutas.ai/#organization" },
          "description": "Skip the endless applications. Get AI-matched to full-time roles, chat with hiring managers, and get hired in minutes.",
          "inLanguage": "en-US"
        },
        {
          "@type": "SoftwareApplication",
          "@id": "https://recrutas.ai/#app",
          "name": "Recrutas",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "url": "https://recrutas.ai",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD",
            "description": "Free to get started"
          },
          "description": "AI-powered job matching and hiring platform. Candidates get matched to roles in real-time; recruiters find pre-screened talent instantly."
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Only load replit banner in development -->
    <script>
      if (window.location.hostname === 'localhost' || window.location.hostname.includes('replit')) {
        const script = document.createElement('script');
        script.src = 'https://replit.com/public/js/replit-dev-banner.js';
        script.type = 'text/javascript';
        document.head.appendChild(script);
      }
    </script>
  </body>
</html>
